version: '3.8'

services:
  product-service:
    build:
      context: ./src/ProductService
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  order-service:
    build:
      context: ./src/OrderService
      dockerfile: Dockerfile
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  auth-service:
    build:
      context: ./src/AuthService
      dockerfile: Dockerfile
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080

  api-gateway:
    build:
      context: ./src/ApiGateway
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - product-service
      - order-service
      - auth-service

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./src/Frontend:/usr/share/nginx/html
    depends_on:
      - api-gateway