<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices E-Shop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        header h1 {
            color: #333;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .status-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .status-card h2 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .status-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-indicator.online {
            background: #27ae60;
            animation: pulse 2s infinite;
        }

        .status-indicator.offline {
            background: #e74c3c;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .status-text {
            color: #666;
            font-size: 14px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .section {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .section h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102, 126, 234, 0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .product-list, .order-list {
            max-height: 450px;
            overflow-y: auto;
            margin: 20px 0;
        }

        .product-item, .order-item {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 5px;
            border-left: 4px solid #667eea;
            transition: all 0.3s;
        }

        .product-item:hover, .order-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .product-item h3, .order-item h3 {
            color: #333;
            margin-bottom: 8px;
            font-size: 16px;
        }

        .product-item p, .order-item p {
            color: #666;
            font-size: 13px;
            margin-bottom: 4px;
        }

        .price {
            color: #27ae60;
            font-weight: 700;
            margin-top: 8px;
            font-size: 15px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .loading {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .error {
            color: white;
            padding: 12px;
            background: #e74c3c;
            border-radius: 5px;
            margin-bottom: 10px;
            animation: slideIn 0.3s;
        }

        .success {
            color: white;
            padding: 12px;
            background: #27ae60;
            border-radius: 5px;
            margin-bottom: 10px;
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .status-grid {
                grid-template-columns: 1fr;
            }

            header {
                padding: 20px;
            }
        }

        /* Scrollbar styling */
        .product-list::-webkit-scrollbar,
        .order-list::-webkit-scrollbar {
            width: 6px;
        }

        .product-list::-webkit-scrollbar-track,
        .order-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .product-list::-webkit-scrollbar-thumb,
        .order-list::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ Microservices E-Shop</h1>
            <p>A production-grade ASP.NET Core microservices application with Product & Order services</p>
        </header>

        <div class="status-grid">
            <div class="status-card">
                <h2>API Gateway</h2>
                <p><span class="status-indicator online"></span><span class="status-text" id="gateway-status">Connection...</span></p>
            </div>
            <div class="status-card">
                <h2>Product Service</h2>
                <p><span class="status-indicator online"></span><span class="status-text" id="product-status">Checking...</span></p>
            </div>
            <div class="status-card">
                <h2>Order Service</h2>
                <p><span class="status-indicator online"></span><span class="status-text" id="order-status">Checking...</span></p>
            </div>
        </div>

        <div class="main-content">
            <!-- Products Section -->
            <div class="section">
                <h2>📦 Products</h2>
                <div id="product-message"></div>
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="product-name" placeholder="e.g., Laptop">
                </div>
                <div class="form-group">
                    <label>Price ($)</label>
                    <input type="number" id="product-price" placeholder="e.g., 999.99" step="0.01">
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="product-description" placeholder="Product description..." rows="2"></textarea>
                </div>
                <button onclick="createProduct()">✨ Create Product</button>

                <h3 style="margin-top: 25px; margin-bottom: 10px; color: #333;">Product Catalog</h3>
                <div class="product-list" id="product-list">
                    <p class="loading">Loading products...</p>
                </div>
            </div>

            <!-- Orders Section -->
            <div class="section">
                <h2>🛒 Orders</h2>
                <div id="order-message"></div>
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="customer-name" placeholder="e.g., John Doe">
                </div>
                <div class="form-group">
                    <label>Product ID</label>
                    <input type="number" id="order-product-id" placeholder="e.g., 1" min="1">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="order-quantity" placeholder="e.g., 2" min="1">
                </div>
                <button onclick="createOrder()">🎯 Create Order</button>

                <h3 style="margin-top: 25px; margin-bottom: 10px; color: #333;">Order History</h3>
                <div class="order-list" id="order-list">
                    <p class="loading">Loading orders...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5002/api';

        // Check service status
        async function checkStatus() {
            try {
                const response = await fetch('http://localhost:5002/gateway/status');
                if (response.ok) {
                    document.getElementById('gateway-status').textContent = 'Online';
                } else {
                    document.getElementById('gateway-status').textContent = 'Offline';
                }
            } catch (e) {
                document.getElementById('gateway-status').textContent = 'Offline';
            }
        }

        // Load products
        async function loadProducts() {
            try {
                const response = await fetch(`${API_BASE}/products?skip=0&take=10`);
                const result = await response.json();
                const container = document.getElementById('product-list');

                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = result.data.map(product => `
                        <div class="product-item">
                            <h3>${product.name}</h3>
                            <p>${product.description}</p>
                            <div class="price">$${product.price.toFixed(2)}</div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="loading">No products available. Create one!</p>';
                }
            } catch (e) {
                document.getElementById('product-list').innerHTML = '<p class="error">❌ Error loading products</p>';
            }
        }

        // Load orders
        async function loadOrders() {
            try {
                const response = await fetch(`${API_BASE}/orders?skip=0&take=10`);
                const result = await response.json();
                const container = document.getElementById('order-list');

                if (result.success && result.data && result.data.length > 0) {
                    container.innerHTML = result.data.map(order => `
                        <div class="order-item">
                            <h3>Order #${order.id}</h3>
                            <p><strong>Customer:</strong> ${order.customerName}</p>
                            <p><strong>Product:</strong> ${order.productName}</p>
                            <p><strong>Qty:</strong> ${order.quantity}</p>
                            <div class="price">Total: $${order.totalPrice.toFixed(2)}</div>
                            <p><span class="status-badge">${order.status}</span></p>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="loading">No orders yet. Place one!</p>';
                }
            } catch (e) {
                document.getElementById('order-list').innerHTML = '<p class="error">❌ Error loading orders</p>';
            }
        }

        // Create product
        async function createProduct() {
            const name = document.getElementById('product-name').value;
            const price = parseFloat(document.getElementById('product-price').value);
            const description = document.getElementById('product-description').value;

            if (!name || !price || !description) {
                showMessage('product-message', '❌ Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/products`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, price, description })
                });

                const result = await response.json();
                if (result.success) {
                    showMessage('product-message', '✅ Product created!', 'success');
                    document.getElementById('product-name').value = '';
                    document.getElementById('product-price').value = '';
                    document.getElementById('product-description').value = '';
                    loadProducts();
                } else {
                    showMessage('product-message', '❌ ' + (result.message || 'Error creating product'), 'error');
                }
            } catch (e) {
                showMessage('product-message', '❌ Error: ' + e.message, 'error');
            }
        }

        // Create order
        async function createOrder() {
            const customerName = document.getElementById('customer-name').value;
            const productId = parseInt(document.getElementById('order-product-id').value);
            const quantity = parseInt(document.getElementById('order-quantity').value);

            if (!customerName || !productId || !quantity) {
                showMessage('order-message', '❌ Please fill all fields', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/orders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ productId, quantity, customerName })
                });

                const result = await response.json();
                if (result.success) {
                    showMessage('order-message', '✅ Order placed!', 'success');
                    document.getElementById('customer-name').value = '';
                    document.getElementById('order-product-id').value = '';
                    document.getElementById('order-quantity').value = '';
                    loadOrders();
                } else {
                    showMessage('order-message', '❌ ' + (result.message || 'Error creating order'), 'error');
                }
            } catch (e) {
                showMessage('order-message', '❌ Error: ' + e.message, 'error');
            }
        }

        // Show message
        function showMessage(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="${type}">${message}</div>`;
            setTimeout(() => { element.innerHTML = ''; }, 4000);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkStatus();
            loadProducts();
            loadOrders();
            setInterval(checkStatus, 5000);
            setInterval(loadProducts, 10000);
            setInterval(loadOrders, 10000);
        });
    </script>
</body>
</html>
