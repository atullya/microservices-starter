<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microservices Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Microservices Dashboard</h1>
            <p>Welcome to your beginner-friendly microservices app!</p>
        </header>

        <main>
            <section class="glass-card">
                <h2>📦 Products</h2>
                <div class="product-list" id="product-list">
                    <!-- Products will be injected here -->
                    <div class="loading">Loading products...</div>
                </div>
                
                <hr>
                
                <h3>Add New Product</h3>
                <form id="product-form">
                    <div class="form-group">
                        <input type="text" id="prod-name" placeholder="Product Name" required>
                    </div>
                    <div class="form-group">
                        <input type="number" id="prod-price" placeholder="Price ($)" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <input type="text" id="prod-desc" placeholder="Description" required>
                    </div>
                    <button type="submit" class="btn-primary">Create Product</button>
                    <div id="prod-msg" class="msg"></div>
                </form>
            </section>

            <section class="glass-card">
                <h2>🛍️ Orders</h2>
                <div class="order-list" id="order-list">
                    <!-- Orders will be injected here -->
                    <div class="loading">Loading orders...</div>
                </div>
                
                <hr>
                
                <h3>Place New Order</h3>
                <form id="order-form">
                    <div class="form-group">
                        <select id="order-prod-id" required>
                            <option value="" disabled selected>Select a Product</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <input type="number" id="order-qty" placeholder="Quantity" min="1" required>
                    </div>
                    <button type="submit" class="btn-secondary">Place Order</button>
                    <div id="order-msg" class="msg"></div>
                </form>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
